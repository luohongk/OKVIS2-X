camera_parameters:
  timestamp_tolerance: 0.020         # 放宽到20ms，容忍更大时间戳抖动
  sync_cameras: [0, 1, 2, 3]
  image_delay: 0.0
  online_calibration:
    do_extrinsics: true             # 🔧 诊断模式：先关闭，隔离是否外参在线漂移导致崩溃
    do_extrinsics_final_ba: false
    sigma_r: 0.005
    sigma_alpha: 0.020
    sigma_r_final_ba: 0.010
    sigma_alpha_final_ba: 0.050
  deep_stereo_indices: [0, 1]
  fov_scale: 0.85

imu_parameters:
  use: true
  rate: 200          # IMU采样频率(Hz)，请根据实际硬件修改！常见值：100/200/400
  a_max: 117.6
  g_max: 7.8         # 原值3.4(195°/s)太小，改为7.8(~450°/s)更安全
  sigma_g_c: 20.0e-4
  sigma_a_c: 2.0e-2
  sigma_bg: 0.01
  sigma_ba: 0.1
  sigma_gw_c: 20.0e-5
  sigma_aw_c: 20.0e-3
  g: 9.81007
  g0: [0.0, 0.0, 0.0]
  a0: [0.0, 0.0, 0.0]
  s_a: [1.0, 1.0, 1.0]
  T_BS:
    [1.00000000, 0.00000000, 0.00000000, 0.00000000,
     0.00000000, 1.00000000, 0.00000000, 0.00000000,
     0.00000000, 0.00000000, 1.00000000, 0.00000000,
     0.00000000, 0.00000000, 0.00000000, 1.00000000]

frontend_parameters:
  detection_threshold: 15.0           # 进一步降低，提取更多特征点（原20，日志显示特征不足）
  absolute_threshold: 12.0           # 配合降低
  matching_threshold: 80.0           # 放宽匹配阈值（原60太严，RANSAC内点率只有14%）
  octaves: 0
  max_num_keypoints: 800            # 恢复1200（上次被改成500太少，跟踪直接弱）
  keyframe_overlap: 0.50             # 降低阈值，更频繁插入关键帧（原0.70太高）
  use_cnn: false
  parallelise_detection: true
  num_matching_threads: 4

estimator_parameters:
  num_keyframes: 5                   # 适中，太多(10)耗时导致实时超时跳过优化
  num_loop_closure_frames: 5
  num_imu_frames: 3
  do_loop_closures: true
  do_final_ba: true
  enforce_realtime: true            # ⚠️ 关闭实时限制！跟踪已弱时不能强制跳过优化
  realtime_min_iterations: 4
  realtime_max_iterations: 15        # 允许更多迭代让优化收敛
  realtime_time_limit: 0.08          # 放宽时间限制（原0.04=40ms太紧）
  realtime_num_threads: 6
  full_graph_iterations: 20
  full_graph_num_threads: 2
  p_dbow: 0.4
  drift_percentage_heuristic: 2.50   # 放宽回环一致性检验（原1.35太严，导致所有回环被拒绝）

output_parameters:
  display_topview: true
  display_matches: true
  display_overhead: false
  enable_submapping: true
